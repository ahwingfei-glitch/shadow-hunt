<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析视图 - 猎影</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Microsoft YaHei, sans-serif; background: #0a1628; color: #e0e6ed; height: 100vh; display: flex; }
        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #0d1b2a; display: flex; flex-direction: column; }
        .logo { padding: 20px; font-size: 24px; font-weight: bold; color: #00d9ff; text-align: center; border-bottom: 1px solid #2a3a5a; }
        .nav { flex: 1; padding: 16px 0; }
        .nav-item { display: flex; align-items: center; padding: 12px 24px; color: #7a8ba3; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { background: rgba(22, 33, 62, 0.5); }
        .nav-item.active { background: #16213e; color: #00d9ff; }
        .nav-item span { margin-left: 12px; }
        .user { padding: 16px 24px; border-top: 1px solid #2a3a5a; display: flex; align-items: center; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #4facfe, #00f2fe); margin-right: 12px; }
        .username { color: #e0e6ed; font-size: 14px; }
        .main { margin-left: 240px; flex: 1; display: flex; height: 100vh; }
        .left { width: 60%; display: flex; flex-direction: column; border-right: 1px solid #2a3a5a; }
        .right { width: 40%; display: flex; flex-direction: column; background: #0d1b2a; }
        .header { padding: 12px 24px; background: #16213e; border-bottom: 1px solid #2a3a5a; font-weight: 600; font-size: 16px; }
        .video-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .video-placeholder { color: #7a8ba3; font-size: 14px; }
        video { max-width: 100%; max-height: 100%; }
        .timeline { height: 50px; background: #16213e; border-top: 1px solid #2a3a5a; display: flex; align-items: center; padding: 0 24px; gap: 12px; }
        .timeline input[type="range"] { flex: 1; height: 4px; accent-color: #00d9ff; }
        .timeline span { font-size: 12px; color: #7a8ba3; min-width: 45px; }
        .results { flex: 1; overflow-y: auto; padding: 16px; }
        .result-item { padding: 12px 16px; background: #16213e; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .result-item:hover { border-color: #00d9ff; background: #1a2744; }
        .result-item .time { font-size: 11px; color: #00d9ff; margin-bottom: 4px; }
        .result-item .action { font-weight: 500; color: #e0e6ed; margin-bottom: 4px; }
        .result-item .meta { font-size: 11px; color: #7a8ba3; display: flex; gap: 16px; }
        .loading { text-align: center; padding: 40px; color: #7a8ba3; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">猎影 Shadow Hunt</div>
        <nav class="nav">
            <div class="nav-item" onclick="location.href='index.html'"><span>🏠</span><span>首页</span></div>
            <div class="nav-item" onclick="location.href='cases.html'"><span>📁</span><span>案件</span></div>
            <div class="nav-item active" onclick="location.href='player.html'"><span>📊</span><span>分析</span></div>
            <div class="nav-item" onclick="location.href='settings.html'"><span>⚙️</span><span>设置</span></div>
        </nav>
        <div class="user"><div class="avatar"></div><span class="username">admin</span></div>
    </aside>
    <div class="main">
        <div class="left">
            <div class="header">📹 视频播放</div>
            <div class="video-container"><div class="video-placeholder" id="placeholder">选择分析结果查看视频片段</div><video id="video" style="display:none" controls></video></div>
            <div class="timeline">
                <span id="curTime">00:00</span>
                <input type="range" id="seekBar" value="0" min="0" max="100" step="0.1">
                <span id="durTime">00:00</span>
            </div>
        </div>
        <div class="right">
            <div class="header">📊 分析结果 (<span id="count">0</span>)</div>
            <div class="results" id="results"><div class="loading">加载中...</div></div>
        </div>
    </div>
    <script>
        const API = 'http://127.0.0.1:8889';
        const API_KEY = 'dev-key-change-in-production';
        const video = document.getElementById('video'), seekBar = document.getElementById('seekBar');
        const curTime = document.getElementById('curTime'), durTime = document.getElementById('durTime');
        const results = document.getElementById('results'), count = document.getElementById('count');
        const placeholder = document.getElementById('placeholder');
        let data = [];
        const fmt = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
        video.addEventListener('loadedmetadata', () => { seekBar.max = video.duration; durTime.textContent = fmt(video.duration); });
        video.addEventListener('timeupdate', () => { if (!video.seeking) seekBar.value = video.currentTime; curTime.textContent = fmt(video.currentTime); });
        seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
        function jumpTo(t) { video.currentTime = t; video.play(); }
        function renderResults(items) {
            count.textContent = items.length;
            if (!items.length) { results.innerHTML = '<div class="loading">暂无数据</div>'; return; }
            results.innerHTML = items.map((it, i) => `
                <div class="result-item" onclick="jumpTo(${it.start})">
                    <div class="time">${fmt(it.start)} - ${fmt(it.end)}</div>
                    <div class="action">${it.action || it.label || '未知动作'}</div>
                    <div class="meta"><span>置信度: ${((it.confidence||0)*100).toFixed(1)}%</span><span>Track: ${it.track_id || '-'}</span></div>
                </div>`).join('');
        }
        async function loadData() {
            try {
                const res = await fetch(`${API}/api/videos`, { headers: { 'X-API-Key': API_KEY } });
                data = await res.json(); if (data.results) data = data.results; renderResults(data);
            } catch (e) { results.innerHTML = `<div class="loading">加载失败: ${e.message}</div>`; }
        }
        const params = new URLSearchParams(location.search);
        if (params.get('video')) { video.src = params.get('video'); video.style.display = 'block'; placeholder.style.display = 'none'; }
        loadData();
    </script>
</body>
</html>
