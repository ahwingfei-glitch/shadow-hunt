<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 猎影 Shadow Hunt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            color: #e0e6ed;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #2a3a5a;
            width: 100%;
            max-width: 380px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #7a8ba3; font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid #2a3a5a;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #e0e6ed;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: #4facfe; background: rgba(79,172,254,0.1); }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #0a1628;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,172,254,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 15px; text-align: center; }
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #7a8ba3;
            font-size: 0.9rem;
        }
        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4facfe;
        }
        .btn-default-key {
            background: transparent;
            border: 1px solid #4facfe;
            color: #4facfe;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-default-key:hover {
            background: rgba(79,172,254,0.15);
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="logo">猎影 Shadow Hunt</h1>
        <div class="input-group">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="请输入 API Key">
        </div>
        <div class="remember-row">
            <label class="checkbox-label">
                <input type="checkbox" id="rememberMe">
                <span>记住我</span>
            </label>
            <button class="btn-default-key" onclick="useDefaultKey()">使用默认 Key</button>
        </div>
        <button class="btn-login" onclick="login()">登 录</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        const API = 'http://127.0.0.1:8889';
        const DEFAULT_API_KEY = 'dev-key-change-in-production';
        
        // 页面加载时检查是否有保存的 API Key
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('api_key');
            const remembered = localStorage.getItem('remember_me') === 'true';
            if (savedKey && remembered) {
                document.getElementById('apiKey').value = savedKey;
                document.getElementById('rememberMe').checked = true;
            }
        });
        
        document.getElementById('apiKey').addEventListener('keypress', e => { 
            if (e.key === 'Enter') login(); 
        });
        
        function useDefaultKey() {
            document.getElementById('apiKey').value = DEFAULT_API_KEY;
            document.getElementById('error').textContent = '';
        }
        
        async function login() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('error');
            const btn = document.querySelector('.btn-login');
            
            if (!apiKey) { 
                errorEl.textContent = '请输入 API Key'; 
                return; 
            }
            
            btn.disabled = true; 
            btn.textContent = '验证中...'; 
            errorEl.textContent = '';
            
            try {
                // 通过调用 /api/config 验证 API Key 有效性
                const res = await fetch(`${API}/api/config`, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': apiKey
                    }
                });
                
                if (res.ok) {
                    // API Key 有效，保存并跳转
                    localStorage.setItem('api_key', apiKey);
                    localStorage.setItem('remember_me', rememberMe.toString());
                    
                    if (!rememberMe) {
                        // 如果不记住，使用 sessionStorage 作为备用
                        sessionStorage.setItem('api_key', apiKey);
                    }
                    
                    window.location.href = '/app';
                } else {
                    const data = await res.json().catch(() => ({}));
                    errorEl.textContent = data.detail || 'API Key 无效或已过期';
                }
            } catch (e) {
                console.error('Login error:', e);
                errorEl.textContent = '连接服务器失败，请检查网络';
            }
            finally { 
                btn.disabled = false; 
                btn.textContent = '登 录'; 
            }
        }
    </script>
</body>
</html>
