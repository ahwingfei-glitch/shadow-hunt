<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 猎影 Shadow Hunt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            color: #e0e6ed;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #2a3a5a;
            width: 100%;
            max-width: 380px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #7a8ba3; font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid #2a3a5a;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #e0e6ed;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: #4facfe; background: rgba(79,172,254,0.1); }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #0a1628;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,172,254,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="logo">猎影 Shadow Hunt</h1>
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button class="btn-login" onclick="login()">登 录</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        const API = 'http://127.0.0.1:8889';
        document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            const btn = document.querySelector('.btn-login');
            if (!username || !password) { errorEl.textContent = '请输入用户名和密码'; return; }
            btn.disabled = true; btn.textContent = '登录中...'; errorEl.textContent = '';
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.api_key) {
                    localStorage.setItem('api_key', data.api_key);
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = data.detail || '登录失败';
                }
            } catch (e) { errorEl.textContent = '连接服务器失败'; }
            finally { btn.disabled = false; btn.textContent = '登 录'; }
        }
    </script>
</body>
</html>
