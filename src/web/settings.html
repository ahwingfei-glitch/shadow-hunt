<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>设置 - 猎影</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#0a1628; font-family:"Microsoft YaHei",sans-serif; color:#e0e6ed; }
.sidebar { position:fixed; left:0; top:0; width:240px; height:100vh; background:#0d1b2a; padding:20px; }
.logo { font-size:24px; color:#00d9ff; margin-bottom:30px; text-align:center; }
.nav-item { padding:12px 16px; margin:8px 0; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px; color:#7a8ba3; }
.nav-item:hover { background:#16213e; }
.nav-item.active { background:#16213e; color:#00d9ff; }
.nav-item span { font-size:14px; }
.user { position:absolute; bottom:20px; left:20px; right:20px; display:flex; align-items:center; gap:12px; }
.avatar { width:40px; height:40px; background:linear-gradient(135deg,#4facfe,#00f2fe); border-radius:50%; }
.user-name { color:#e0e6ed; font-size:14px; }
.main { margin-left:240px; padding:30px; }
.page-title { font-size:28px; margin-bottom:30px; }
.card { background:#16213e; border-radius:8px; padding:20px; margin-bottom:20px; }
.card-title { font-size:16px; color:#00d9ff; margin-bottom:15px; }
.form-group { display:flex; align-items:center; justify-content:space-between; margin:12px 0; }
.form-group label { color:#7a8ba3; font-size:14px; }
.slider { width:200px; height:6px; background:#2a3a5a; border-radius:3px; appearance:none; }
.slider::-webkit-slider-thumb { appearance:none; width:16px; height:16px; background:#00d9ff; border-radius:50%; cursor:pointer; }
.switch { position:relative; width:50px; height:26px; background:#2a3a5a; border-radius:13px; cursor:pointer; }
.switch.on { background:#00d9ff; }
.switch-dot { position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:0.3s; }
.switch.on .switch-dot { left:27px; }
input[type="text"],input[type="number"] { background:#0a1628; border:1px solid #2a3a5a; border-radius:6px; padding:10px; color:#e0e6ed; width:200px; }
.btn { padding:12px 24px; border-radius:20px; cursor:pointer; font-size:14px; border:none; margin-right:10px; }
.btn-save { background:linear-gradient(135deg,#4facfe,#00f2fe); color:#0a1628; }
.btn-reset { background:#2a3a5a; color:#e0e6ed; }
.status { margin-top:20px; padding:10px; border-radius:6px; display:none; }
.status.success { background:#1a3a1a; color:#4caf50; display:block; }
.status.error { background:#3a1a1a; color:#f44336; display:block; }
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">猎影 Shadow Hunt</div>
<div class="nav-item" onclick="location.href='/app'"><span>🏠 首页</span></div>
<div class="nav-item" onclick="location.href='/app/cases'"><span>📁 案件</span></div>
<div class="nav-item" onclick="location.href='/app/player'"><span>📊 分析</span></div>
<div class="nav-item active" onclick="location.href='/app/settings'"><span>⚙️ 设置</span></div>
<div class="user"><div class="avatar"></div><div class="user-name">admin</div></div>
</div>
<div class="main">
<h1 class="page-title">系统设置</h1>
<div class="card">
<div class="card-title">性能设置</div>
<div class="form-group"><label>CPU 线程数</label><input type="range" class="slider" id="threads" min="1" max="16" value="4"><span id="threadVal">4</span></div>
<div class="form-group"><label>内存阈值 (MB)</label><input type="number" id="memory" value="2048"></div>
</div>
<div class="card">
<div class="card-title">检测阈值</div>
<div class="form-group"><label>目标框阈值 (box_threshold)</label><input type="range" class="slider" id="boxThreshold" min="0" max="1" step="0.01" value="0.5"><span id="boxVal">0.50</span></div>
<div class="form-group"><label>文本阈值 (text_threshold)</label><input type="range" class="slider" id="textThreshold" min="0" max="1" step="0.01" value="0.5"><span id="textVal">0.50</span></div>
</div>
<div class="card">
<div class="card-title">模型设置</div>
<div class="form-group"><label>模型路径</label><input type="text" id="modelPath" placeholder="./models"></div>
</div>
<div class="card">
<div class="card-title">加速选项</div>
<div class="form-group"><label>OpenVINO 加速</label><div class="switch" id="openvino"><div class="switch-dot"></div></div></div>
<div class="form-group"><label>AVX-512 指令集</label><div class="switch" id="avx512"><div class="switch-dot"></div></div></div>
</div>
<button class="btn btn-save" onclick="save()">保存配置</button>
<button class="btn btn-reset" onclick="reset()">重置</button>
<div class="status" id="status"></div>
</div>
<script>
const API='http://127.0.0.1:8889';
const API_KEY='dev-key-change-in-production';

// 滑块实时显示
document.getElementById('threads').oninput=e=>document.getElementById('threadVal').textContent=e.target.value;
document.getElementById('boxThreshold').oninput=e=>document.getElementById('boxVal').textContent=parseFloat(e.target.value).toFixed(2);
document.getElementById('textThreshold').oninput=e=>document.getElementById('textVal').textContent=parseFloat(e.target.value).toFixed(2);

// 开关切换
document.querySelectorAll('.switch').forEach(s=>s.onclick=()=>s.classList.toggle('on'));

// 显示状态信息
function showStatus(msg,isSuccess){
const status=document.getElementById('status');
status.className='status '+(isSuccess?'success':'error');
status.textContent=msg;
setTimeout(()=>status.className='status',3000);
}

// 页面加载时获取配置
async function loadConfig(){
try{
const res=await fetch(`${API}/api/config`,{headers:{'X-API-Key':API_KEY}});
if(!res.ok)throw new Error('获取配置失败');
const config=await res.json();

// 填充表单
if(config.cpu_threads!==undefined){
document.getElementById('threads').value=config.cpu_threads;
document.getElementById('threadVal').textContent=config.cpu_threads;
}
if(config.memory_threshold_mb!==undefined){
document.getElementById('memory').value=config.memory_threshold_mb;
}
if(config.box_threshold!==undefined){
document.getElementById('boxThreshold').value=config.box_threshold;
document.getElementById('boxVal').textContent=parseFloat(config.box_threshold).toFixed(2);
}
if(config.text_threshold!==undefined){
document.getElementById('textThreshold').value=config.text_threshold;
document.getElementById('textVal').textContent=parseFloat(config.text_threshold).toFixed(2);
}
if(config.model_path!==undefined){
document.getElementById('modelPath').value=config.model_path;
}
if(config.use_openvino===true){
document.getElementById('openvino').classList.add('on');
}
if(config.use_avx512===true){
document.getElementById('avx512').classList.add('on');
}
}catch(e){
console.error('加载配置失败:',e);
showStatus('加载配置失败: '+e.message,false);
}
}

// 保存配置
async function save(){
const status=document.getElementById('status');
try{
const configs=[
{key:'cpu_threads',value:parseInt(document.getElementById('threads').value)},
{key:'memory_threshold_mb',value:parseInt(document.getElementById('memory').value)},
{key:'box_threshold',value:parseFloat(document.getElementById('boxThreshold').value)},
{key:'text_threshold',value:parseFloat(document.getElementById('textThreshold').value)},
{key:'model_path',value:document.getElementById('modelPath').value||'./models'},
{key:'use_openvino',value:document.getElementById('openvino').classList.contains('on')},
{key:'use_avx512',value:document.getElementById('avx512').classList.contains('on')}
];

let savedCount=0;
for(const cfg of configs){
const res=await fetch(`${API}/api/config`,{method:'PUT',headers:{'Content-Type':'application/json','X-API-Key':API_KEY},body:JSON.stringify(cfg)});
if(res.ok)savedCount++;
}

if(savedCount===configs.length){
showStatus('配置已保存 ('+savedCount+'项)',true);
}else{
showStatus('部分保存成功 ('+savedCount+'/'+configs.length+'项)',false);
}
}catch(e){
showStatus('保存失败: '+e.message,false);
}
}

// 重置为默认值
function reset(){
document.getElementById('threads').value=4;
document.getElementById('threadVal').textContent='4';
document.getElementById('memory').value=2048;
document.getElementById('boxThreshold').value=0.5;
document.getElementById('boxVal').textContent='0.50';
document.getElementById('textThreshold').value=0.5;
document.getElementById('textVal').textContent='0.50';
document.getElementById('modelPath').value='';
document.querySelectorAll('.switch').forEach(s=>s.classList.remove('on'));
showStatus('已重置为默认值，请点击保存生效',true);
}

// 页面加载完成后自动获取配置
window.onload=loadConfig;
</script>
</body>
</html>
