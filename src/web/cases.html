<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>案件管理 - 猎影</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Microsoft YaHei,sans-serif;background:#0a1628;color:#e0e6ed;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;width:240px;height:100vh;background:#0d1b2a;display:flex;flex-direction:column}
.logo{padding:20px;font-size:24px;font-weight:bold;color:#00d9ff;text-align:center;border-bottom:1px solid #2a3a5a}
.nav{flex:1;padding:16px 0}
.nav-item{display:flex;align-items:center;padding:12px 24px;color:#7a8ba3;font-size:14px;cursor:pointer;transition:all 0.2s}
.nav-item:hover{background:rgba(22,33,62,0.5)}
.nav-item.active{background:#16213e;color:#00d9ff}
.nav-item span{margin-left:12px}
.user{padding:16px 24px;border-top:1px solid #2a3a5a;display:flex;align-items:center}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4facfe,#00f2fe);margin-right:12px}
.username{color:#e0e6ed;font-size:14px}
.main{margin-left:240px;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
h1{font-size:28px;color:#e0e6ed}
.btn-primary{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#000;border:none;padding:10px 24px;border-radius:20px;cursor:pointer;font-weight:600;transition:transform 0.2s}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(0,217,255,0.3)}
table{width:100%;border-collapse:collapse;background:#16213e;border-radius:8px;overflow:hidden}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid #2a3a5a}
th{background:#0d1b2a;color:#00d9ff;font-weight:600}
tr:hover{background:rgba(79,172,254,0.1)}
.status{padding:4px 12px;border-radius:20px;font-size:12px}
.status.open{background:#ffc107;color:#000}
.status.closed{background:#4caf50;color:#fff}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">猎影 Shadow Hunt</div>
  <nav class="nav">
    <div class="nav-item" onclick="location.href='index.html'"><span>🏠</span><span>首页</span></div>
    <div class="nav-item active"><span>📁</span><span>案件</span></div>
    <div class="nav-item"><span>📊</span><span>分析</span></div>
    <div class="nav-item"><span>⚙️</span><span>设置</span></div>
  </nav>
  <div class="user"><div class="avatar"></div><span class="username">admin</span></div>
</aside>
<main class="main">
  <div class="header">
    <h1>案件管理</h1>
    <button class="btn-primary" onclick="createCase()">+ 新建案件</button>
  </div>
  <table><thead><tr><th>案件编号</th><th>案件名称</th><th>状态</th><th>创建时间</th></tr></thead><tbody id="caseList"></tbody></table>
</main>
<script>
const API='http://localhost:8889/api/cases';
const API_KEY=localStorage.getItem('apiKey')||'';
async function loadCases(){try{const r=await fetch(API,{headers:{'X-API-Key':API_KEY}});const d=await r.json();render(d);}catch(e){console.error(e);document.getElementById('caseList').innerHTML='<tr><td colspan="4" style="text-align:center;color:#7a8ba3">加载失败</td></tr>';}}
function render(cases){document.getElementById('caseList').innerHTML=cases.map(c=>`<tr><td>${c.id}</td><td>${c.name}</td><td><span class="status ${c.status}">${c.status==='open'?'进行中':'已结案'}</span></td><td>${c.createdAt||'-'}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:#7a8ba3">暂无案件</td></tr>';}
function createCase(){alert('新建案件功能开发中');}
loadCases();
</script>
</body>
</html>
